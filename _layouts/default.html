<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% unless page.title == nil %}{{ page.title }} · {% endunless %}{{ site.title }}</title>
    <meta
      name="description"
      content="{{ page.description | default: site.description }}"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="site-header__inner">
          <a class="logo" href="/">Trung Duc Nguyen</a>
          <nav class="site-nav" aria-label="Điều hướng chính">
            <a href="/" {% if page.url == '/' %}aria-current="page"{% endif %}>Trang chủ</a>
            <a href="/projects.html" {% if page.url == '/projects.html' or page.url contains '/projects/' %}aria-current="page"{% endif %}>Dự án</a>
            <a href="/something.html" {% if page.url == '/something.html' %}aria-current="page"{% endif %}>Linh tinh</a>
            <a href="/about.html" {% if page.url == '/about.html' %}aria-current="page"{% endif %}>Giới thiệu</a>
          </nav>
        </div>
      </header>

      <main class="site-main">
        {{ content }}
      </main>

      <footer class="site-footer">
        <div class="site-footer__inner">
          <p class="site-footer__copyright">© 2026 Trung Duc Nguyen</p>
          <ul class="footer-contact-list">
            <li><span>Email:</span> <a href="mailto:trungduc.ngtd@gmail.com">trungduc.ngtd@gmail.com</a></li>
            <li><span>Github:</span> <a href="https://github.com/trungducngtd" target="_blank" rel="noreferrer">github.com/trungducngtd</a></li>
            <li><span>Facebook:</span> <a href="https://www.facebook.com/nguyen.trung.uc.811833/" target="_blank" rel="noreferrer">facebook.com/nguyen.trung.uc.811833</a></li>
          </ul>
        </div>
      </footer>
    </div>

    <script src="/assets/js/site.js" defer></script>
  </body>
</html>
