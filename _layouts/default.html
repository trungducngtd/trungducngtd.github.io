<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% unless page.title == nil %}{{ page.title }} · {% endunless %}{{ site.title }}</title>
    <meta
      name="description"
      content="{{ page.description | default: site.description }}"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="site-header__inner">
          <a class="logo" href="/">Trung Duc Nguyen</a>
          <nav class="site-nav" aria-label="Điều hướng chính">
            <a href="/">Trang chủ</a>
            <a href="/projects.html">Dự án</a>
            <a href="/something.html">Linh tinh</a>
            <a href="/about.html">Giới thiệu</a>
          </nav>
        </div>
      </header>

      <main class="site-main">
        {{ content }}
      </main>

      <footer class="site-footer">
        <p>© 2026 Duc Nguyen</p>
        <div class="footer-links">
          <a href="https://github.com/trungducngtd" target="_blank" rel="noreferrer">GitHub</a>
          <a href="mailto:trungduc.ngtd@gmail.com">Email</a>
        </div>
      </footer>
    </div>

    <script src="/assets/js/site.js" defer></script>
  </body>
</html>
